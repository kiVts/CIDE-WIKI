modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"

[[mods]]
    modId = "pcinfo"
    version = "${version}"
    displayName = "PC Info"
    description = "Adds a small pcinfo Lua API for CC:Tweaked computers."

[[dependencies.pcinfo]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neoforge_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.pcinfo]]
    modId = "minecraft"
    type = "required"
    versionRange = "[${minecraft_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.pcinfo]]
    modId = "computercraft"
    type = "required"
    versionRange = "[1.114.2,)"
    ordering = "AFTER"
    side = "BOTH"
